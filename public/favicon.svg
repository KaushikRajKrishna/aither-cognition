<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brain silhouette -->
  <path d="M16 3c-3 0-5.5 1.5-7.5 4C6.5 9.5 5 12.5 4 16c-1 3.5-1 7 0 10 0.5 1.5 2 3 3.5 4 3 1 6 1 9 0 1.5-0.5 3-2 3.5-3.5 1-3 1-6.5 0-10C27 12.5 25.5 9.5 24 7 22.5 4.5 20 3 16 3z" fill="url(#brainGradient)"/>

  <!-- Neural network connections -->
  <g stroke="url(#techGradient)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M10 12c2 0 3 1 3 3s-1 3-3 3"/>
    <path d="M22 12c-2 0-3 1-3 3s1 3 3 3"/>
    <path d="M16 8c-1 0-2 1-2 2s1 2 2 2 2-1 2-2-1-2-2-2"/>
    <path d="M16 26c-1 0-2-1-2-2s1-2 2-2 2 1 2 2-1 2-2 2"/>
    <path d="M12 18h8"/>
    <path d="M14 14h4"/>
  </g>

  <!-- Tech circuit nodes -->
  <circle cx="10" cy="15" r="1.5" fill="url(#techGradient)"/>
  <circle cx="22" cy="15" r="1.5" fill="url(#techGradient)"/>
  <circle cx="14" cy="10" r="1" fill="#06B6D4"/>
  <circle cx="18" cy="10" r="1" fill="#06B6D4"/>
  <circle cx="16" cy="24" r="1.5" fill="url(#techGradient)"/>
  <circle cx="16" cy="18" r="1" fill="#3B82F6"/>
  <circle cx="14" cy="16" r="0.8" fill="#EC4899"/>
  <circle cx="18" cy="16" r="0.8" fill="#EC4899"/>

  <!-- Digital pulse -->
  <rect x="6" y="20" width="20" height="1" fill="url(#techGradient)" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>